<!doctype html>
<html>
<head>
<meta charset="utf-8">

<style>

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
width:420px;
margin:12px;
}

button{
width:100%;
padding:10px;
cursor:pointer;
margin-top:8px;
}

textarea{
width:100%;
height:210px;
margin-top:10px;
font-family:ui-monospace,Menlo,Monaco,Consolas,monospace;
font-size:12px;
line-height:1.35;
}

.row{
display:flex;
gap:8px;
margin-top:8px;
}

.row button{
flex:1;
}

</style>

</head>

<body>

<button id="formatSelectedBtn">Format selected text → Copy</button>

<div class="row">
<button id="formatPastedBtn">Format what's in box</button>
<button id="copyBtn">Copy output</button>
</div>

<textarea id="box" placeholder="Highlight an email thread or paste text here"></textarea>

<script src="popup.js"></script>

</body>
</html>
